<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Banff Travel Map</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<style>
/* 전체 레이아웃 */
.layout {
  display: flex;
  height: 100vh;
}

/* 지도 */
#map {
  flex: 1;
  height: 100%;
}

/* 일정표 패널 */
.schedule-panel {
  width: 340px;
  background: #ffffff;
  border-left: 1px solid #e0e0e0;
  padding: 20px;
  overflow-y: auto;
}

/* Tabs */
.tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 15px;
}

.tab {
  flex: 1;
  padding: 10px;
  background: #f0f0f0;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

.tab.active {
  background: #1e88e5;
  color: white;
}

/* Day content */
.day-content {
  display: none;
}

.day-content.active {
  display: block;
}

/* 일정표 */
.schedule-list {
  list-style: none;
  padding: 0;
}

.schedule-list li {
  margin-bottom: 15px;
  font-size: 14px;
  cursor: pointer;
  padding: 8px;
  border-radius: 6px;
  transition: background 0.2s;
}

.schedule-list li:hover {
  background: #f0f7ff;
}

.time {
  font-weight: bold;
  color: #1e88e5;
  margin-right: 6px;
}

.reason {
  margin-top: 4px;
  font-size: 13px;
  color: #555;
}

/* 이동시간 라벨 */
.time-label div {
  background: #1e88e5;
  color: white;
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: bold;
  box-shadow: 0 2px 6px rgba(0,0,0,0.25);
  white-space: nowrap;
}

/* 모바일 */
@media (max-width: 768px) {
  .layout {
    flex-direction: column;
  }
  #map {
    height: 400px;
  }
  .schedule-panel {
    width: 100%;
    border-left: none;
    border-top: 1px solid #e0e0e0;
  }
}
</style>
</head>

<body>
<div class="layout">
  <div id="map"></div>

  <div class="schedule-panel">
    <div class="tabs">
      <button class="tab active" data-day="day1">Day 1</button>
      <button class="tab" data-day="day2">Day 2</button>
      <button class="tab" data-day="day3">Day 3</button>
    </div>

    <!-- DAY 1 -->
    <div id="day1" class="day-content active">
      <h3>📅 Day 1: Banff Town & Valley</h3>
      <ul class="schedule-list">
        <li data-place="존스턴 협곡">🥾 <span class="time">08:30 - 10:00</span> 존스턴 협곡
          <div class="reason">완만한 데크 산책. 유모차 가능.</div>
        </li>

        <li data-place="보우 폭포">🏞️ <span class="time">10:30 - 12:00</span> 보우 폭포 & 페어몬트 호텔
          <div class="reason">도보 1분 폭포 도달. 포토스팟.</div>
        </li>

        <li>🛏️ <span class="time">12:00 - 14:30</span> 점심 & 아기 낮잠
          <div class="reason">아기 컨디션 관리.</div>
        </li>

        <li data-place="미네완카 호수">🚤 <span class="time">15:00 - 17:00</span> 미네완카 호수 크루즈
          <div class="reason">밀폐형 온수 선내. 아기 선호도 높음.</div>
        </li>
      </ul>
    </div>

    <!-- DAY 2 -->
    <div id="day2" class="day-content">
